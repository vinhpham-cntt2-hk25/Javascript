<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>btvn3.html</title>
</head>
<body>
    <script>
let thanhCong = 0;
let khongThanhCong = 0;

console.log("--- HỆ THỐNG XỬ LÝ GIA HẠN SÁCH ---");

while (true) {
    let cauHoi = prompt("Có yêu cầu gia hạn mới không? (có/không)").toLowerCase();

    if (cauHoi === "không" || cauHoi === "khong") {
        break; 
    } else if (cauHoi === "có" || cauHoi === "co") {
        
        let tenBanDoc = prompt("Tên bạn đọc:");
        let tenSach = prompt("Tên sách:");
        
        let ngayHienTai = parseInt(prompt("Số ngày đã mượn hiện tại:"));
        let ngayGiaHan = parseInt(prompt("Số ngày muốn gia hạn thêm:"));

        if (isNaN(ngayHienTai) || ngayHienTai < 1 || isNaN(ngayGiaHan) || ngayGiaHan < 1) {
            alert("Lỗi: Số ngày phải là số nguyên lớn hơn hoặc bằng 1. Vui lòng thực hiện lại yêu cầu này.");
            continue; 
        }

        let tongNgay = ngayHienTai + ngayGiaHan;
        let thongBao = "";
        let trangThai = false;

        if (tongNgay > 60) {
            thongBao = "Không được gia hạn: Tổng thời gian vượt quá 60 ngày tối đa";
            trangThai = false;
        } else if (ngayHienTai > 45) {
            thongBao = "Không được gia hạn: Đã mượn quá lâu (>45 ngày)";
            trangThai = false;
        } else {
            thongBao = "Gia hạn thành công";
            trangThai = true;
        }

        console.log(`Bạn đọc: ${tenBanDoc} | Sách: ${tenSach}`);
        console.log(`Kết quả: ${thongBao}`);
        
        if (trangThai) {
            thanhCong++;
        } else {
            khongThanhCong++;
        }

    } else {
        alert("Vui lòng chỉ nhập 'có' hoặc 'không'.");
    }
}
console.log("================================");
console.log("THỐNG KÊ CA LÀM VIỆC");
console.log(`- Số lần gia hạn thành công: ${thanhCong}`);
console.log(`- Số lần gia hạn không thành công: ${khongThanhCong}`);
console.log("================================");
    </script>
</body>
</html>
