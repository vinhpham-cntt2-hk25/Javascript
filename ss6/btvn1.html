<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>btvn1.html</title>
</head>
<body>
    <script>
        // ===== KHAI BÁO MẢNG =====
let arr = [];

// ===== NHẬP 10 PHẦN TỬ =====
for (let i = 0; i < 10; i++) {
    let num = parseInt(prompt("Nhập số nguyên thứ " + (i + 1) + ":"));
    arr.push(num);
}

// ===== XỬ LÝ & HIỂN THỊ =====
let result = [];

for (let i = 0; i < arr.length; i++) {
    if (arr[i] >= 10) {
        result.push(arr[i]);
    }
}

if (result.length > 0) {
    console.log(result.join(" "));
} else {
    console.log("Không có số nào lớn hơn 10");
}

    </script>
</body>
</html>
