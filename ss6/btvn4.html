<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>btvn4.html</title>
</head>
<body>
    <script>
    let n = parseInt(prompt("Nhập số phần tử của mảng:"));

    let arr = [];
    let digitChars = [];

    if (n === 0) {
        console.log("Không có ký tự số");
    } else {
        for (let i = 0; i < n; i++) {
            let ch = prompt("Nhập ký tự thứ " + (i + 1) + ":");
            arr.push(ch);

        if (ch >= '0' && ch <= '9') {
            digitChars.push(ch);
        }
    }

        if (digitChars.length > 0) {
            console.log(digitChars.join(" "));
        } else {
            console.log("Không có ký tự số");
        }
    }
    </script>
</body>
</html>
