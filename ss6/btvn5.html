<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       // ===== NHẬP SỐ PHẦN TỬ =====
let n = parseInt(prompt("Nhập số phần tử của mảng:"));

if (n < 0) {
    console.log("Số lượng phần tử không được âm");
} else if (n === 0) {
    console.log("Mảng không có phần tử");
} else {
    let arr = [];
    let sum = 0;
    let hasNumber = false;

    // ===== NHẬP MẢNG KÝ TỰ =====
    for (let i = 0; i < n; i++) {
        let ch = prompt("Nhập ký tự thứ " + (i + 1) + ":");
        arr.push(ch);

        // kiểm tra ký tự có phải là số nguyên không
        if (!isNaN(ch) && Number.isInteger(Number(ch))) {
            sum += Number(ch);
            hasNumber = true;
        }
    }

    // ===== IN KẾT QUẢ =====
    if (hasNumber) {
        console.log(sum);
    } else {
        console.log("Không có phần tử nào là số");
    }
}

    </script>
</body>
</html>
