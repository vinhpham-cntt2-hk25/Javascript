<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đội bóng</title>
</head>
<body>
    
    <script>
        const squad = [
            ["Nguyen Van A", 10, "FW"],
            ["Tran Van B", 5, "MF"],
            ["Le Van C", 2, "DF"],
            ["Pham Van D", 12, "FW"],
            ["Hoang Van E", 0, "GK"],
            ["Dang Van F", 7, "MF"]
        ];

        function xemDanhSach() {
            console.log("=> DANH SÁCH CẦU THỦ:");
            squad.forEach(player => {
                console.log(`${player[0]} (${player[2]}): ${player[1]} bàn thắng`);
            });
        }

        function timKiem(ten) {
            const found = squad.find(player => player[0].toLowerCase() === ten.toLowerCase());
            if (found) {
                console.log(`=> TÌM THẤY: ${found[0]} (${found[2]}): ${found[1]} bàn thắng`);
            } else {
                console.log("=> Không tìm thấy cầu thủ!");
            }
        }

        function locViTri(vitri) {
            const filtered = squad.filter(player => player[2] === vitri);
            console.log("=> KẾT QUẢ LỌC:");
            filtered.forEach(player => {
                console.log(`- ${player[0]} (${player[1]} bàn)`);
            });
        }

        function tongBanThang() {
            const total = squad.reduce((sum, player) => sum + player[1], 0);
            console.log(`=> Tổng số bàn thắng toàn đội: ${total} bàn`);
        }

        function kiemTraHieuSuat() {
            const coNguoiChuaGhiBan = squad.some(player => player[1] === 0);
            const tatCaDaGhiBan = squad.every(player => player[1] > 0);

            if (coNguoiChuaGhiBan) {
                console.log("=> Có cầu thủ chưa ghi bàn");
            }
            if (tatCaDaGhiBan) {
                console.log("=> Tất cả cầu thủ đều đã ghi bàn");
            }
        }

        function menu() {
            console.log("--- QUẢN LÝ ĐỘI BÓNG ---");
            console.log("1. Xem danh sách");
            console.log("2. Tìm kiếm (Find)");
            console.log("3. Lọc vị trí (Filter)");
            console.log("4. Tổng bàn thắng (Reduce)");
            console.log("5. Kiểm tra hiệu suất (Some/Every)");
            console.log("0. Thoát");
        }

        // Chạy menu với prompt (chỉ demo trên console)
        let choice;
        do {
            menu();
            choice = prompt("Nhập lựa chọn (0-5):");
            switch(choice) {
                case "1":
                    xemDanhSach();
                    break;
                case "2":
                    let ten = prompt("Nhập tên cầu thủ:");
                    timKiem(ten);
                    break;
                case "3":
                    let vitri = prompt("Nhập vị trí (FW/MF/DF/GK):");
                    locViTri(vitri);
                    break;
                case "4":
                    tongBanThang();
                    break;
                case "5":
                    kiemTraHieuSuat();
                    break;
                case "0":
                    console.log("=> Hẹn gặp lại!");
                    break;
                default:
                    console.log("=> Lựa chọn không hợp lệ!");
            }
        } while(choice !== "0");
    </script>
</body>
</html>
